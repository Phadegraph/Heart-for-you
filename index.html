<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>for you</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020102;
            font-family: 'Consolas', monospace;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let W = window.innerWidth;
        let H = window.innerHeight;
        
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.scale(dpr, dpr);

        const TEXT_STR = "I love you";
        const HEART_NODES = [];
        let lastTime = performance.now();

        // 1. Color Palette Configuration (Rosy Pink to Scarlet Gradient)
        const COLOR_START = { r: 255, g: 100, b: 150 }; 
        const COLOR_END = { r: 220, g: 20, b: 60 };   

        function lerpColor(c1, c2, t) {
            return {
                r: Math.floor(c1.r + (c2.r - c1.r) * t),
                g: Math.floor(c1.g + (c2.g - c1.g) * t),
                b: Math.floor(c1.b + (c2.b - c1.b) * t)
            };
        }

        // Pre-cache textures to remain completely performant on mobile web browsers
        const numColors = 30; 
        const cachedGlows = [];
        const fontSize = Math.max(9, Math.min(W, H) * 0.018); // Slightly smaller font to allow dense packing inside the fill area

        for (let i = 0; i < numColors; i++) {
            const t = i / (numColors - 1); 
            const colorObj = lerpColor(COLOR_START, COLOR_END, t);
            const colorStr = `rgb(${colorObj.r}, ${colorObj.g}, ${colorObj.b})`;

            const glowCache = document.createElement('canvas');
            const cacheCtx = glowCache.getContext('2d');
            
            cacheCtx.font = `bold ${fontSize}px Consolas, monospace`;
            const textMetrics = cacheCtx.measureText(TEXT_STR);
            const textW = Math.ceil(textMetrics.width);
            const textH = Math.ceil(fontSize * 1.2);
            const padding = 24; 

            glowCache.width = textW + padding;
            glowCache.height = textH + padding;
            
            cacheCtx.font = `bold ${fontSize}px Consolas, monospace`;
            cacheCtx.fillStyle = colorStr;
            cacheCtx.shadowColor = colorStr;
            cacheCtx.shadowBlur = 12; 
            cacheCtx.textBaseline = 'middle';
            cacheCtx.fillText(TEXT_STR, padding / 2, glowCache.height / 2);

            cachedGlows.push(glowCache);
        }

        // 2. Generate Filled Perfect Heart Coordinate Points
        function initHeart() {
            HEART_NODES.length = 0; 
            const cx = W / 2;
            const cy = H / 2;
            const maxScale = Math.min(W, H) / 38;

            // Generate concentric filled internal layers from the core outward
            // Using fine mathematical step reductions to ensure there are no open structural gaps
            for (let s = 0.05; s <= 1.0; s += 0.05) {
                // Scale density relative to size step so inner zones aren't over-packed
                const numPoints = Math.floor(280 * s); 
                
                for (let i = 0; i < numPoints; i++) {
                    const t = (i / numPoints) * Math.PI * 2;
                    
                    // Master Parametric Equation scaled inwards by 's'
                    const x = (maxScale * s) * 16 * Math.pow(Math.sin(t), 3);
                    const y = -(maxScale * s) * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                    // Base the gradient color assignment relative to its vertical position inside the total shape footprint
                    const relativeY = (y / maxScale + 17) / 30; 
                    const colorIndex = Math.floor(relativeY * (numColors - 1));
                    const clampedIndex = Math.max(0, Math.min(numColors - 1, colorIndex));

                    HEART_NODES.push({
                        x: cx + x,
                        y: cy + y,
                        alpha: 0,
                        // Outer edge layers take on bright neon presence; internal volumes use deep, soft layers
                        target: s > 0.95 ? (Math.random() * 0.3 + 0.7) : (Math.random() * 0.4 + 0.3), 
                        delay: Math.random() * 5000 + (1.0 - s) * 1500 // Staggers drawing animation shifts from inside out
                    });
                }
            }
        }

        // 3. Main Runtime Hardware Engine Loop
        function loop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            ctx.fillStyle = '#020102'; 
            ctx.fillRect(0, 0, W, H);

            for (let i = 0; i < HEART_NODES.length; i++) {
                const node = HEART_NODES[i];

                if (node.delay > 0) {
                    node.delay -= dt;
                } else if (node.alpha < node.target) {
                    node.alpha += 0.0003 * dt; 
                    if (node.alpha > node.target) node.alpha = node.target;
                }

                if (node.alpha > 0) {
                    ctx.globalAlpha = node.alpha;
                    
                    // Dynamically map node colors to create vertical gradient blending across all filling layers
                    const maxScale = Math.min(W, H) / 38;
                    const calculatedY = (node.y - H / 2) / maxScale;
                    const normalizedY = (calculatedY + 17) / 30;
                    const colorIndex = Math.max(0, Math.min(numColors - 1, Math.floor(normalizedY * (numColors - 1))));
                    
                    const glowAsset = cachedGlows[colorIndex];
                    
                    ctx.drawImage(
                        glowAsset, 
                        node.x - glowAsset.width / 2, 
                        node.y - glowAsset.height / 2
                    );
                }
            }

            ctx.globalAlpha = 1.0; 
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.scale(dpr, dpr);
            initHeart();
        });

        window.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        });

        initHeart();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
